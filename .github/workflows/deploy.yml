name: Deploy CV Website to Home Server

on:
  push:
    branches: [ "main" ] # Tự động chạy khi push code vào nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Dạy GitHub cách dùng cloudflared để chui qua tunnel
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.REMOTE_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Deploy files via Rsync
        run: |
          # Đẩy toàn bộ code vào thư mục web trên server
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" ./ ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/var/www/cv_website/

      - name: Restart Web Service (Optional)
        run: |
          # Nếu bạn có dùng service để chạy web, hãy restart nó ở đây
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "echo 'Deploy thành công!'"